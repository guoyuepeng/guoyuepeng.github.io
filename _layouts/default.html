<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <aside class="site-sidebar" aria-label="Site navigation">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        {% if site.description %}
          <p class="site-description">{{ site.description }}</p>
        {% endif %}

        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Posts</a>
          {% for path in site.header_pages %}
            {% assign nav_page = site.pages | where: "path", path | first %}
            {% if nav_page.title %}
              <a href="{{ nav_page.url | relative_url }}" {% if page.url == nav_page.url %}aria-current="page"{% endif %}>{{ nav_page.title }}</a>
            {% endif %}
          {% endfor %}
        </nav>
      </aside>

      <main class="site-content">
        {{ content }}
      </main>
    </div>
  </body>
</html>
